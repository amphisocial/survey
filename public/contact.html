<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contact Athena Survey</title><link rel="stylesheet" href="/styles.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"></head><body><div class="shell"><header class="topbar"><a class="brand" href="/"><span class="brand-mark">A</span><span><strong>Athena</strong> Survey</span></a><div id="authArea"></div></header><main class="section"><div class="panel" style="max-width:720px;margin:auto"><span class="section-kicker">Contact</span><h1>Talk to us about Athena Survey</h1><p class="muted">This form sends to the configured contact recipient, defaulting to anu@threadwire.ai.</p><div class="form-grid"><label>Name<input id="name"></label><label>Email<input id="email" type="email"></label><label>Message<textarea id="message" rows="7"></textarea></label><button class="btn primary large" id="send">Send message</button><div class="error" id="err"></div></div></div></main></div><div class="toast" id="toast"></div><script src="/common.js"></script><script>(async()=>{Athena.authArea((await Athena.me()).user);Athena.$('#send').onclick=async()=>{try{await Athena.api('/api/contact',{method:'POST',body:JSON.stringify({name:Athena.$('#name').value,email:Athena.$('#email').value,message:Athena.$('#message').value})});Athena.toast('Message sent.');Athena.$('#message').value='';}catch(e){Athena.$('#err').textContent=e.message}}})()</script></body></html>
